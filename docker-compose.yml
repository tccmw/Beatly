services:
  api:
    image: beatly-api-local:latest
    build:
      context: ./apps/api
    environment:
      BEATLY_UPLOAD_DIR: /tmp/beatly/uploads
      BEATLY_SEPARATED_DIR: /tmp/beatly/separated
      BEATLY_ANALYSIS_CACHE_DIR: /tmp/beatly/analysis-cache
      BEATLY_USE_STUBS: "false"
      BEATLY_ENABLE_LYRICS: "true"
      BEATLY_FORCE_VOCALS_FOR_LYRICS: "true"
      WHISPER_MODEL: large-v3-turbo
      WHISPER_ENGINE: faster-whisper
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_BEAM_SIZE: 1
      WHISPER_VAD_FILTER: "false"
      WHISPER_DOWNLOAD_ROOT: /root/.cache/faster-whisper
      WHISPER_OPENAI_FALLBACK: "false"
      HF_HUB_DISABLE_XET: "1"
      DEMUCS_MODE: full
      DEMUCS_JOBS: 0
    ports:
      - "8000:8000"
    volumes:
      - beatly-model-cache:/root/.cache
      - beatly-data:/tmp/beatly

  web:
    image: beatly-web-local:latest
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  beatly-model-cache:
  beatly-data:
