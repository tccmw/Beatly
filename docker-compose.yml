services:
  api:
    image: beatly-api-local:latest
    build:
      context: ./apps/api
    environment:
      BEATLY_UPLOAD_DIR: /tmp/beatly/uploads
      BEATLY_SEPARATED_DIR: /tmp/beatly/separated
      BEATLY_USE_STUBS: "false"
      BEATLY_ENABLE_LYRICS: "false"
      BEATLY_FORCE_VOCALS_FOR_LYRICS: "false"
      WHISPER_MODEL: tiny
      DEMUCS_MODE: none
      DEMUCS_JOBS: 0
    ports:
      - "8000:8000"
    volumes:
      - beatly-model-cache:/root/.cache
      - beatly-data:/tmp/beatly

  web:
    image: beatly-web-local:latest
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  beatly-model-cache:
  beatly-data:
